version: "3"

vars:
  HOST:
    sh: hostname -s
  FLAKE: "{{.ROOT_DIR}}"
  PLATFORM:
    sh: uname -s
  TOPLEVEL:
    sh: |
      case "{{.PLATFORM}}" in
        Darwin) printf '%s#darwinConfigurations."%s".system\n' "{{.FLAKE}}" "{{.HOST}}" ;;
        Linux) printf '%s#nixosConfigurations."%s".config.system.build.toplevel\n' "{{.FLAKE}}" "{{.HOST}}" ;;
        *) printf 'unsupported platform: %s\n' "{{.PLATFORM}}" >&2; exit 1 ;;
      esac

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  info:
    desc: Show the selected host and flake
    cmds:
      - 'echo "Host:  {{.HOST}}"'
      - 'echo "Flake: {{.FLAKE}}"'
    silent: true

  fmt:
    desc: Format Nix, shell, YAML, JSON, and Markdown files
    cmds:
      - nix fmt "{{.FLAKE}}"

  check:
    desc: Run flake checks with nix-output-monitor
    preconditions:
      - sh: command -v nom >/dev/null 2>&1
        msg: Run this task through `nix run .#task -- check` or from `nix develop`.
    cmds:
      - |
        bash -o pipefail -c '
          flake="$1"
          shift
          nix flake check "$flake" \
            --show-trace \
            --log-format internal-json \
            -v \
            "$@" 2>&1 | nom --json
        ' -- "{{.FLAKE}}" {{.CLI_ARGS}}

  build:
    desc: Build the selected system configuration without activating it
    aliases: [b]
    preconditions:
      - sh: command -v nom >/dev/null 2>&1
        msg: Run this task through `nix run .#task -- build` or from `nix develop`.
    cmds:
      - >-
        nom build
        '{{.TOPLEVEL}}'
        --no-link
        --show-trace
        {{.CLI_ARGS}}

  test:
    desc: Build and activate temporarily; the change is lost after reboot
    aliases: [t]
    cmds:
      - task: _rebuild
        vars:
          ACTION: test

  boot:
    desc: Build and make the configuration the next boot target
    cmds:
      - task: _rebuild
        vars:
          ACTION: boot

  switch:
    desc: Build and activate the selected system configuration
    aliases: [s]
    cmds:
      - task: _rebuild
        vars:
          ACTION: switch

  update:
    desc: Update all flake inputs, or inputs named after `--`
    aliases: [u]
    cmds:
      - nix flake update {{.CLI_ARGS}}

  upgrade:
    desc: Update all inputs and switch to the resulting configuration
    cmds:
      - task: update
      - task: switch

  clean:
    desc: Delete system generations and store paths older than AGE (default 3d)
    vars:
      AGE: '{{default "3d" .AGE}}'
    cmds:
      - sudo nix-collect-garbage --delete-older-than "{{.AGE}}"

  _rebuild:
    internal: true
    requires:
      vars:
        - name: ACTION
          enum: [test, boot, switch]
    preconditions:
      - sh: command -v nom >/dev/null 2>&1
        msg: Run this task through `nix run .#task -- {{.ACTION}}` or from `nix develop`.
    cmds:
      - |
        bash -o pipefail -c '
          action="$1"
          flake="$2"
          platform="$3"
          shift 3

          # Authenticate before stdout/stderr are piped through nom so the
          # password prompt remains visible. -n prevents a hidden second prompt.
          sudo -v

          case "$platform" in
            Darwin)
              if [ "$action" = boot ]; then
                printf "The boot action is only supported on NixOS.\n" >&2
                exit 1
              fi

              sudo -n -H nix run nix-darwin -- "$action" \
                --flake "$flake" \
                --show-trace \
                "$@" 2>&1 | nom
              ;;
            Linux)
              sudo -n -H nixos-rebuild "$action" \
                --flake "$flake" \
                --show-trace \
                "$@" 2>&1 | nom
              ;;
            *)
              printf "Unsupported platform: %s\n" "$platform" >&2
              exit 1
              ;;
          esac
        ' -- "{{.ACTION}}" "{{.FLAKE}}#{{.HOST}}" "{{.PLATFORM}}" {{.CLI_ARGS}}
