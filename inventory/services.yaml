services:
  gitea:
    endpoint: https://git.c4rb0n.cloud
    production_host: mia
    intended_host: clio
    status: active-on-mia
    implementation: nixos-native
    stateful: true
    backup:
      local_dump: /var/backup/gitea
      off_host: restic-to-vela

  hub:
    endpoint: https://hub.c4rb0n.cloud
    production_host: icarus
    status: active
    implementation: nixos-native
    stateful: false
    backup: not-required

  mosquitto:
    endpoint: mqtt.c4rb0n.cloud:1883
    production_host: icarus
    intended_host: mia
    status: migration-preparation
    implementation: nixos-native
    stateful: true

  influxdb:
    endpoint: https://influx.c4rb0n.cloud
    intended_host: mia
    status: fresh-deployment
    implementation: nixos-native
    stateful: true

  home-assistant:
    endpoint: https://ha.c4rb0n.cloud
    production_host: icarus
    intended_host: mia
    status: migration-preparation
    implementation: nixos-managed-oci
    stateful: true
    hardware:
      zigbee: Silicon Labs Sonoff Zigbee 3.0 USB Dongle Plus
    backup:
      off_host: restic-to-vela-after-cutover

  paperless:
    endpoint: https://paperless.c4rb0n.cloud
    production_host: icarus
    status: initial-deployment
    implementation: nixos-native
    stateful: true
    ingestion: brother-ads-1800w-over-sftp
    backup: planned-restic-to-vela

  unifi:
    endpoint: https://unifi.c4rb0n.cloud
    production_host: icarus
    status: migration-preparation
    implementation: nixos-managed-oci
    stateful: true
    backup:
      application_backup: /var/backups/unifi-import
      off_host: restic-to-vela-after-cutover

  inverter-data-collector:
    endpoint: mqtt://127.0.0.1:1883/house/pv/sma/stp20_50/state
    production_host: icarus
    status: active
    implementation: nixos-native
    stateful: false
    backup: not-required
    hardware:
      inverter: SMA Tripower X / STP 20-50
      protocol: SunSpec Modbus TCP
